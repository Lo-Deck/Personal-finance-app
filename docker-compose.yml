

version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_finance
    restart: always
    environment:
      POSTGRES_USER: lolosuperuser
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: db_finance_app
    ports:
      - "5435:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

